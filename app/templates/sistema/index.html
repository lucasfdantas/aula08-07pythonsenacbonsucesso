<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Status do Servidor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background: #1e1e1e; color: #d4d4d4; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #569cd6; border-bottom: 1px solid #3c3c3c; padding-bottom: 10px; }
        .section { margin-bottom: 25px; background: #252526; padding: 15px; border-radius: 5px; border: 1px solid #3c3c3c; }
        h2 { font-size: 1.1em; color: #4ec9b0; margin-top: 0; }
        pre { background: #000; padding: 12px; border-radius: 4px; overflow-x: auto; font-family: 'Courier New', Courier, monospace; color: #00ff00; }
    </style>
</head>
<body>

<div class="container">
    <h1>Status do Servidor (Modo: Comando do Sistema)</h1>
    <p>Sistema Operativo Detectado: <strong>{{ sistema }}</strong></p>

    <div class="section">
        <h2>Nome do Servidor</h2>
        <pre>{{ nome_servidor }}</pre>
    </div>

    <div class="section">
        <h2>Processador (CPU)</h2>
        <pre>{{ processador }}</pre>
    </div>

    <div class="section">
        <h2>Memória RAM</h2>
        <pre>{{ memoria }}</pre>
    </div>

    <div class="section">
        <h2>Status de Rede</h2>
        <pre>{{ rede }}</pre>
    </div>
</div>

</body>
</html>
